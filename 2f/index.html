<!DOCTYPE html>
<html lang="ja">

<head>

  <meta name="format-detection" content="telephone=no">
  <title>___</title>

  <link rel="stylesheet" href="style.css" />

    --main-text: #000;

    <hr/>

    </p>
    <hr/>

      <p>div class="text" p</p>
    </div>
    <div class="images">
      <img src="#" alt="div.images img">
    </div>

  <section id="info">

      <p>section id="info"</p>
      <u>section#info div.more u</u>
      <p><img src="#" alt="section#info img"></p>
    </div>

      <p>section#info div.text p</p>
