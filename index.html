<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no" />

  <link rel="icon" href="画像データURL">
  <link rel="apple-touch-icon" href="画像データURL">

  <link rel="stylesheet" href="style.css" />

  <style type="text/css">
    #html:checked~a:not(.html),
    #css:checked~a:not(.css),
    #js:checked~a:not(.js),
    #etc:checked~a:not(.etc) {
      display: none;
    }
  </style>
</head>

<body>
  <header id="header"></header>
  <main>
    <form id="org">
      <input id="all" type="radio" name="btn" checked>
      <label class="btn" for="all">How to Coding</label>
      <input id="html" type="radio" name="btn">
      <label class="btn" for="html">HTML</label>
      <input id="css" type="radio" name="btn">
      <label class="btn" for="css">CSS</label>
      <input id="js" type="radio" name="btn">
      <label class="btn" for="js">JavaScript</label>
      <input id="etc" type="radio" name="btn">
      <label class="btn" for="etc">Etc,</label>
    </form>
  </main>

  <script src="script.js"></script>
  <script src="//code.jquery.com/jquery-3.4.1.min.js"></script>
  <script type="text/javascript">
    $(function() {
      $("#header").load("/menu/index.html");
    })
  </script>
</body>

</html>
