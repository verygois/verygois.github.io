<!DOCTYPE html>
<html lang="ja">

<head>
    <title>ここにウェブサイトのタイトルを入力</title>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ここにウェブサイトの説明文を入力">

    <link rel="icon" href="画像データURL">
    <link rel="stylesheet" type="text/css" href="css/random.css" />
    <link rel="stylesheet" type="text/css" href="css/readme.css" />

    <style type="text/css">
        #ityped {
            padding: 1.25vw 0 0;
        }

        .ityped-cursor {
            display: inline-block;
            opacity: 1;
            -webkit-animation: blink 0.3s infinite;
            -moz-animation: blink 0.3s infinite;
            animation: blink 0.3s infinite;
            animation-direction: alternate;
        }

        @keyframes blink {
            100% {
                opacity: 0;
            }
        }

        @-webkit-keyframes blink {
            100% {
                opacity: 0;
            }
        }

        @-moz-keyframes blink {
            100% {
                opacity: 0;
            }
        }
    </style>

</head>

<body>
    <div id="menu"></div>
    <div id="random">
    </div>
    
    <div id="readme">
        <div id="cv">
            <span class="type-text" id="ityped"></span>
        </div>
    </div>

    <script src="https://unpkg.com/ityped@1.0.3"></script>
    <script src="ityped.js" type="text/javascript"></script>
    <script src="img.js" type="text/javascript"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script type="text/javascript">
        $(function () {
            $("#menu").load("menu.html");
        })


        let img = document.getElementById('random');
        img.innerHTML = contents;

        function shuffleContent(container) {
            let content = container.find("> *");
            let total = content.length;
            content.each(function () {
                content.eq(Math.floor(Math.random() * total)).prependTo(container);
            });
        }

        $(function random() {
            shuffleContent($("#random"));
        });
    </script>
</body>

</html>
