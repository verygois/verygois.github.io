<!DOCTYPE html>
<html lang="ja">
<head>
  
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style type="text/css">
.tab,
#mobile_menu {
  font-family:;
}
.tab {
  color:#000;
  text-decoration:none;
}
.tab:hover,
.check b,
#mobile_open a:hover,
#mobile_open b {
  color:blue;
}

#menu {
  position:fixed;
  top:0; left:0;
  z-index: 500;
  width:100%;
  height:5vh;
}
#inside {
  position:absolute;
  z-index:200;
  top:50%; left:50%;
  -webkit-transform:translate(-50%,-50%);
  transform:translate(-50%,-50%);
}
#header {
  width:95%;
  padding:0.5% 2.5%;
  font-size:2vh;
  display: flex;
  justify-content: space-between;
  flex-wrap:wrap;
}
#mobile_open {
  position:fixed;
  top:0; right:0;
  padding:0.5% 2.5%;
  font-size:2vh;
  z-index: 500;
  display:none;
}
#inside {display:none;}

#mobile_open a:hover {cursor:pointer;}
.check {
  float:left;
  opacity:1;
  display:inline-block;
  width:1.5rem;
  margin-right:1rem;
  text-align:center;
}
#inside .check,
#mobile_open .check {
  margin-right:7.5vw;
}
#header .check:before,
#inside .check:before,
#mobile_open .check:before {
	content:'[';
  opacity:1;
}
#header .check:after,
#inside .check:after,
#mobile_open .check:after {
	content:']';
  opacity:1;
}

#about_o b,
#show_o b,
#up_o b,
#etc_o b,
#mobile_o b
{opacity: 0;}

#about:hover + #about_o b,
#show:hover + #show_o b,
#up:hover + #up_o b,
#etc:hover + #etc_o b,
#mobile_open a:hover + #mobile_o b
{opacity: 1;}

#mobile_menu {
  z-index:200;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
}

@media screen and (max-width: 750px){
  #header :not(#top) {
    display:none;
  }
  #inside {
    display:block;
    font-size:7.5vw;
    background-color:rgba(255,255,255,0.5);
    padding:7.5vh 7.5%;
    width:65%;
    overflow-y:auto;
  }
  #mobile_open {display:block;}
}

</style>

</head>
<body>
<div id="menu">
<div id="header">
<a href="/" class="tab" id="top">Very Gois</a>
<div><a href="cv/" id="about" class="tab">About</a><span id="about_o" class="check"><b>✔</b></span></div>
<div><a href="show/" id="show" class="tab">List</a><span id="show_o" class="check"><b>✔</b></span></div>
<div><a href="random.html" id="up" class="tab">Img</a><span id="up_o" class="check"><b>✔</b></span></div>
</div>

<div id="mobile_open">
<a onclick="obj=document.getElementById('mobile_menu').style; obj.display=(obj.display=='none')?'block':'none';" class="tab">Menu</a>
<span id="mobile_o" class="check"><b>✔</b></span>
</div>
</div>

<div id="mobile_menu" style="display:none;">
<div id="inside">
<div><a href="cv/" id="about" class="tab">About</a><span id="about_o" class="check"><b>✔</b></span></div>
<div><a href="show/" id="show" class="tab">List</a><span id="show_o" class="check"><b>✔</b></span></div>
<div><a href="random.html" id="up" class="tab">Img</a><span id="up_o" class="check"><b>✔</b></span></div>
</div>
</div>
</body>
</html>
